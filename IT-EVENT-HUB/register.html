<!-- Banner -->
<section class="event-banner">
<div class="container text-center">
<h1>Đăng ký tham gia sự kiện</h1>
<p>
Điền đầy đủ thông tin để tham gia các hoạt động CNTT.
</p>
</div>
</section>
<!-- Form -->
<div class="container my-5">
<div class="register-box">
<h2 class="text-center mb-4">
Biểu mẫu đăng ký
</h2>
<form id="form">
<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">
Họ và tên
</label>
<input
type="text"
id="name"
class="form-control"
placeholder="Nhập họ và tên">
</div>
<div class="col-md-6 mb-3">
<label class="form-label">
Email
</label>
<input
type="email"
id="email"
class="form-control"
placeholder="example@gmail.com">
</div>
<div class="col-md-6 mb-3">
<label class="form-label">
Số điện thoại
</label>
<input
type="text"
id="phone"
class="form-control"
placeholder="Nhập số điện thoại">
</div>
<div class="col-md-6 mb-3">
<label class="form-label">
Lớp
</label>
<input
type="text"
id="class"
class="form-control"
placeholder="Ví dụ: D23TH01">
</div>
<div class="col-12 mb-3">
<label class="form-label">
Chọn sự kiện
</label>
<select id="event" class="form-select">
<option value="">
-- Chọn sự kiện --
</option>
<option>
Workshop HTML CSS
</option>
<option>
JavaScript DOM
</option>
<option>
React Cơ Bản
</option>
<option>
Database SQL
</option>
<option>
NodeJS Backend
</option>
<option>
AI Seminar
</option>
<option>
Machine Learning
</option>
<option>
Hackathon IT
</option>
</select>
</div>
<div class="col-12 mb-3">
<label class="form-label">
Ghi chú
</label>
<textarea
id="note"
rows="4"
class="form-control"
placeholder="Nhập ghi chú nếu có">
</textarea>
</div>
</div>
<div class="d-grid">
<button class="btn btn-primary btn-lg">
Đăng ký ngay 🚀
</button>
</div>
</form>
<p id="msg" class="text-center mt-4 fw-bold"></p>
</div>
</div>
